# config/move_base/costmap_common_params.yaml
robot_radius: 0.10          # JetBot is ~11cm wide, use 10cm radius (circular)

# Obstacle layer — laser
obstacle_layer:
  enabled: true
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    topic: /scan
    sensor_frame: laser
    data_type: LaserScan
    marking: true
    clearing: true
    min_obstacle_height: -0.1
    max_obstacle_height:  1.0

# Inflation layer
inflation_layer:
  enabled: true
  inflation_radius: 0.20    # slightly bigger than robot_radius
  cost_scaling_factor: 3.0
